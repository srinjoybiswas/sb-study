<!DOCTYPE html>
<html lang="en" ng-app="sbNotesApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔒 Fortress Viewer | SB Notes Ultra Secure</title>

    <!-- Frameworks -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            user-select: none !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #07090f, #030408);
            color: #eef2ff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .fortress-card {
            background: rgba(8, 10, 18, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(220, 38, 38, 0.5);
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .premium-split {
            display: flex;
            min-height: 80vh;
        }

        .viewer-fortress {
            flex: 2.3;
            background: #010102;
            border-radius: 28px;
            margin: 14px;
            position: relative;
            overflow: hidden;
            border: 1px solid #dc262650;
        }

        /* SHIELD: Blocks pop-out button from image_02759d.png */
        .iframe-shield {
            position: absolute;
            top: 0;
            right: 0;
            width: 120px;
            height: 70px;
            z-index: 10025;
            background: transparent;
        }

        /* SUSPENSION OVERLAY */
        .account-locked-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .pencil-panel {
            flex: 1.1;
            background: rgba(0, 0, 0, 0.7);
            border-left: 2px solid #dc2626;
            margin: 14px 14px 14px 0;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
        }

        .pencil-text {
            width: 100%;
            flex-grow: 1;
            background: #1e1915;
            color: #f0dbc0;
            padding: 15px;
            border: none;
            font-family: monospace;
            resize: none;
        }

        .security-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #dc2626;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 100000;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(-50%); }
            25% { transform: translateX(-55%); }
            75% { transform: translateX(-45%); }
        }

        iframe { width: 100%; height: 100%; border: none; }
        [ng-cloak] { display: none; }
    </style>
</head>

<body ng-controller="FortressController" ng-cloak>

    <!-- ACCOUNT SUSPENDED SCREEN (Triggered after 10 violations) -->
    <div class="account-locked-overlay" ng-if="accountSuspended">
        <i class="fas fa-user-slash fa-5x text-danger mb-4"></i>
        <h1 class="text-white fw-bold">ACCOUNT SUSPENDED</h1>
        <p class="text-danger fs-4">Security Protocol Violated 10 Times</p>
        <div class="bg-dark border border-danger p-4 rounded-4 mt-3">
            <p class="text-white mb-1">Your access is blocked for:</p>
            <h2 class="text-danger fw-bold">24 HOURS</h2>
            <small class="text-muted">Reason: Multiple unauthorized Copy/Paste/Inspect attempts</small>
        </div>
    </div>

    <div class="container-fluid py-3" ng-if="!accountSuspended">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="dashboard.html" class="btn btn-outline-danger rounded-pill px-4">Dashboard</a>
            <div class="bg-dark rounded-pill px-3 py-2 border border-danger">
                <i class="far fa-clock text-danger me-2"></i><b>{{timeLeft}}</b>
            </div>
        </div>

        <div class="fortress-card">
            <div class="premium-split">
                <div class="viewer-fortress">
                    <div class="iframe-shield" ng-click="logViolation('🚫 Pop-out blocked')"></div>
                    <iframe ng-src="{{trustedUrl}}" id="pdfFrame"></iframe>
                </div>

                <div class="pencil-panel">
                    <div class="p-3 border-bottom border-danger d-flex justify-content-between">
                        <span class="text-white"><i class="fas fa-pencil-alt text-danger me-2"></i>Pencil</span>
                        <button class="btn btn-sm btn-outline-danger" ng-click="downloadNotesPDF()"><i class="fas fa-download"></i></button>
                    </div>
                    <textarea ng-model="pencilNote" class="pencil-text" placeholder="📝 Secure notes..."></textarea>
                    <div class="p-2 text-center text-muted small">Violations: {{violations}}/10</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = angular.module('sbNotesApp', []);
        app.controller('FortressController', function ($scope, $sce, $window, $timeout) {
            
            // SECURITY TRACKER
            $scope.violations = parseInt(localStorage.getItem('security_violations')) || 0;
            $scope.accountSuspended = false;

            // CHECK IF PREVIOUSLY SUSPENDED
            const suspensionTime = localStorage.getItem('suspension_end');
            if (suspensionTime && new Date().getTime() < suspensionTime) {
                $scope.accountSuspended = true;
            }

            $scope.logViolation = function(msg) {
                $scope.violations++;
                localStorage.setItem('security_violations', $scope.violations);
                
                if ($scope.violations >= 10) {
                    const blockUntil = new Date().getTime() + (24 * 60 * 60 * 1000);
                    localStorage.setItem('suspension_end', blockUntil);
                    $scope.accountSuspended = true;
                } else {
                    $scope.showToast(`${msg} (${$scope.violations}/10 warning)`);
                }
            };

            $scope.showToast = (msg) => {
                const toast = document.createElement('div');
                toast.className = 'security-toast';
                toast.innerText = msg;
                document.body.appendChild(toast);
                $timeout(() => toast.remove(), 2500);
            };

            // BLOCK COPY, PASTE, CONTEXT MENU, INSPECT
            $window.addEventListener('copy', (e) => { e.preventDefault(); $scope.$apply(() => $scope.logViolation('📋 COPY BLOCKED')); });
            $window.addEventListener('paste', (e) => { e.preventDefault(); $scope.$apply(() => $scope.logViolation('📌 PASTE BLOCKED')); });
            $window.addEventListener('contextmenu', (e) => { e.preventDefault(); $scope.$apply(() => $scope.logViolation('🖱️ RIGHT-CLICK BLOCKED')); });
            
            $window.addEventListener('keydown', (e) => {
                if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || (e.ctrlKey && e.key === "U")) {
                    e.preventDefault();
                    $scope.$apply(() => $scope.logViolation('🛡️ DEVTOOLS BLOCKED'));
                }
            });

            // DATA LOADING
            const savedNote = JSON.parse(localStorage.getItem('currentNote') || '{"content":""}');
            $scope.trustedUrl = $sce.trustAsResourceUrl(savedNote.content.split('/view')[0] + '/preview');

            $scope.downloadNotesPDF = () => {
                html2pdf().from(document.querySelector('.pencil-text')).save('Notes.pdf');
            };

            // TIMER
            $scope.timeLeft = "30:00";
            let totalSec = 1800;
            setInterval(() => {
                totalSec--;
                let m = Math.floor(totalSec / 60);
                let s = totalSec % 60;
                $scope.$apply(() => { $scope.timeLeft = m + ":" + (s < 10 ? "0" : "") + s; });
            }, 1000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" ng-app="sbNotesApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔒 FORTRESS MOBILE | Zero-Trust Secure Vault</title>

    <!-- Frameworks -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            user-select: none !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #05070c, #010101);
            color: #eef2ff;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            touch-action: pan-x pan-y; /* allow scrolling but block pinch-zoom */
        }

        /* FULLSCREEN MODE STYLES */
        body.fullscreen-active .container-fluid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: #000;
            padding: 0 !important;
            margin: 0 !important;
        }
        body.fullscreen-active .fortress-card {
            border-radius: 0 !important;
            margin: 0 !important;
            height: 100vh;
        }
        body.fullscreen-active .premium-split {
            min-height: 100vh;
            flex-direction: row;
        }
        body.fullscreen-active .viewer-fortress {
            margin: 0 !important;
            border-radius: 0 !important;
        }
        body.fullscreen-active .pencil-panel {
            margin: 0 !important;
            border-radius: 0 !important;
        }

        /* MOBILE RESPONSIVE: column layout on small screens */
        @media (max-width: 768px) {
            .premium-split {
                flex-direction: column !important;
                min-height: auto !important;
            }
            .viewer-fortress {
                min-height: 45vh !important;
                margin: 12px !important;
            }
            .pencil-panel {
                margin: 0 12px 12px 12px !important;
                min-height: 30vh !important;
                border-left: none !important;
                border-top: 3px solid #dc2626 !important;
            }
            .btn-group-responsive {
                flex-wrap: wrap;
                gap: 8px;
            }
            .violation-badge {
                font-size: 0.8rem;
            }
            .timer-display {
                font-size: 0.9rem;
            }
            .pencil-text {
                font-size: 13px;
                padding: 12px;
            }
            .container-fluid {
                padding: 8px !important;
            }
            .stop-btn-mobile {
                padding: 8px 16px !important;
                font-size: 0.85rem;
            }
        }

        /* tablet optimization */
        @media (min-width: 769px) and (max-width: 1024px) {
            .premium-split {
                flex-direction: row;
            }
            .pencil-text {
                font-size: 13px;
            }
        }

        .fortress-card {
            background: rgba(2, 4, 12, 0.96);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(220, 38, 38, 0.75);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }

        .premium-split {
            display: flex;
            min-height: 82vh;
        }

        .viewer-fortress {
            flex: 2.4;
            background: #000000;
            border-radius: 24px;
            margin: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid #dc2626;
            box-shadow: 0 0 0 2px rgba(220,38,38,0.2);
            min-height: 400px;
        }

        /* PDF COPY PREVENTION SHIELDS */
        .pdf-copy-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10040;
            background: transparent;
            pointer-events: none;
        }
        .popout-blocker {
            position: absolute;
            top: 0;
            right: 0;
            width: 180px;
            height: 80px;
            z-index: 10045;
            background: transparent;
            pointer-events: auto;
            cursor: default;
        }
        .no-exfil {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: transparent;
            z-index: 10028;
        }

        /* BLUR OVERLAY FOR STOP MODE */
        .blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            backdrop-filter: blur(20px);
            z-index: 200000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 25px;
            padding: 20px;
            text-align: center;
        }
        .blur-overlay .resume-btn {
            background: linear-gradient(45deg, #dc2626, #b91c1c);
            border: none;
            padding: 16px 42px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            box-shadow: 0 0 30px rgba(220,38,38,0.7);
            transition: transform 0.2s;
            cursor: pointer;
            z-index: 200001;
            touch-action: manipulation;
        }
        .blur-overlay .resume-btn:active {
            transform: scale(0.98);
        }
        .blur-overlay .warning-text {
            color: #ffaa00;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .account-locked-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000ee;
            backdrop-filter: blur(20px);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 4px solid #ff3300;
            padding: 20px;
        }

        .pencil-panel {
            flex: 1.1;
            background: rgba(8, 6, 12, 0.85);
            border-left: 3px solid #dc2626;
            margin: 16px 16px 16px 0;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(4px);
        }

        .pencil-text {
            width: 100%;
            flex-grow: 1;
            background: #0f0c0a;
            color: #f5e7d3;
            padding: 16px;
            border: none;
            font-family: 'Fira Code', 'Courier New', monospace;
            resize: none;
            font-size: 14px;
            outline: none;
            caret-color: #dc2626;
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        .pencil-text:focus {
            background: #171210;
        }

        .security-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #b91c1c;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 100000;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.8);
            font-family: monospace;
            border-left: 6px solid #ffcc00;
            animation: intenseShake 0.3s ease-in-out;
            max-width: 85%;
            text-align: center;
            font-size: 0.85rem;
        }

        @keyframes intenseShake {
            0%,100% { transform: translateX(-50%) translateY(0); }
            20% { transform: translateX(-56%) translateY(-2px); }
            40% { transform: translateX(-44%) translateY(2px); }
            60% { transform: translateX(-52%) translateY(-1px); }
            80% { transform: translateX(-48%) translateY(1px); }
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            pointer-events: auto;
        }
        
        img, iframe {
            -webkit-user-drag: none;
            user-drag: none;
        }

        .violation-badge {
            background: #1e1a1a;
            border-radius: 40px;
            font-weight: bold;
            white-space: nowrap;
        }

        [ng-cloak] { display: none; }
        
        @media print {
            body * { visibility: hidden; }
            .security-toast { visibility: visible; }
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1f1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #dc2626;
            border-radius: 8px;
        }

        .btn-outline-danger, .btn-outline-warning {
            touch-action: manipulation;
        }
        
        /* mobile safe area */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
    </style>
</head>
<body ng-controller="FortressController" ng-cloak>

    <!-- BLUR OVERLAY (STOP button pressed) -->
    <div class="blur-overlay" ng-if="blurActive && !accountSuspended">
        <i class="fas fa-ban fa-5x text-danger mb-3"></i>
        <div class="warning-text"><i class="fas fa-eye-slash me-2"></i> SESSION PAUSED - SCREEN LOCKED</div>
        <button class="resume-btn" ng-click="resumeSession()">
            <i class="fas fa-play me-2"></i> RESUME & UNBLUR
        </button>
        <small class="text-muted mt-3">Tab switching or leaving fullscreen triggers violations</small>
    </div>

    <!-- ACCOUNT SUSPEND MODAL -->
    <div class="account-locked-overlay" ng-if="accountSuspended">
        <div class="p-4 text-center">
            <i class="fas fa-shield-haltered fa-5x text-danger mb-4"></i>
            <h1 class="text-white fw-bold display-6">⚡ ACCOUNT LOCKED ⚡</h1>
            <p class="text-danger fs-5 mt-3">Security Violation Limit Reached (10/10)</p>
            <div class="bg-dark border border-danger p-4 rounded-4 mt-4 shadow-lg">
                <p class="text-white-50"><i class="fas fa-skull me-2"></i> LOCKDOWN ACTIVE</p>
                <h2 class="text-danger fw-bold">{{suspensionHours}} HOURS</h2>
                <small class="text-muted">🔐 Unauthorized actions detected</small>
            </div>
        </div>
    </div>

    <div class="container-fluid py-2 px-3" ng-if="!accountSuspended && !blurActive">
        <!-- Mobile Optimized Header -->
        <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2 btn-group-responsive">
            <div class="d-flex gap-2">
                <button class="btn btn-outline-danger rounded-pill px-3 py-1 py-md-2 border-2 fw-bold" ng-click="exitFullscreen()" style="font-size: 0.85rem;">
                    <i class="fas fa-compress me-1"></i> <span class="d-none d-sm-inline">Exit FS</span><span class="d-inline d-sm-none">Exit</span>
                </button>
                <button class="btn btn-outline-warning rounded-pill px-3 py-1 py-md-2 border-2 fw-bold stop-btn-mobile" ng-click="activateStopBlur()">
                    <i class="fas fa-stop-circle me-1"></i> <span class="d-none d-sm-inline">Lock Screen</span><span class="d-inline d-sm-none">Lock</span>
                </button>
            </div>
            <div class="bg-black rounded-pill px-3 py-1 border border-danger shadow timer-display">
                <i class="far fa-hourglass-half text-danger me-1"></i>
                <b class="text-light">{{timeLeft}}</b>
            </div>
            <div class="violation-badge px-2 px-sm-3 py-1 rounded-pill bg-dark border border-danger">
                <i class="fas fa-exclamation-triangle text-warning me-1"></i>
                <span class="text-danger fw-bold">{{violations}}/10</span>
            </div>
        </div>

        <div class="fortress-card">
            <div class="premium-split">
                <div class="viewer-fortress" id="fortressViewer">
                    <!-- MULTI-LAYER PDF COPY PREVENTION -->
                    <div class="pdf-copy-shield" oncontextmenu="event.preventDefault(); return false;"></div>
                    <div class="popout-blocker" ng-click="logViolation('⚠️ POP-OUT BUTTON BLOCKED')" oncontextmenu="event.preventDefault();"></div>
                    <div class="no-exfil"></div>
                    <iframe ng-src="{{trustedUrl}}" id="pdfFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation"></iframe>
                </div>

                <div class="pencil-panel">
                    <div class="p-2 p-sm-3 border-bottom border-danger d-flex justify-content-between align-items-center">
                        <span class="text-white fw-bold" style="font-size: 0.9rem;"><i class="fas fa-pen-fancy text-danger me-2"></i>SECURE NOTES</span>
                        <button class="btn btn-sm btn-outline-danger rounded-pill px-3" ng-click="downloadNotesPDF()">
                            <i class="fas fa-file-pdf me-1"></i> PDF
                        </button>
                    </div>
                    <textarea ng-model="pencilNote" class="pencil-text" placeholder="📝 Secure notes — Copy/paste is blocked globally. Your notes are auto-saved locally."></textarea>
                    <div class="p-1 p-sm-2 text-center text-muted small bg-black bg-opacity-50">
                        <i class="fas fa-lock me-1"></i> Anti-Copy Active • Auto-save
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = angular.module('sbNotesApp', []);
        app.controller('FortressController', function($scope, $sce, $window, $timeout, $document) {
            
            // ---------- VIOLATION ENGINE ----------
            let violationCount = parseInt(localStorage.getItem('fortress_violations_strict'));
            if (isNaN(violationCount)) violationCount = 0;
            $scope.violations = violationCount;
            $scope.accountSuspended = false;
            $scope.blurActive = false;
            $scope.suspensionHours = 24;
            
            // suspension check
            const suspendUntilRaw = localStorage.getItem('fortress_lock_until');
            if (suspendUntilRaw && parseInt(suspendUntilRaw) > Date.now()) {
                $scope.accountSuspended = true;
            } else if (suspendUntilRaw && parseInt(suspendUntilRaw) <= Date.now()) {
                localStorage.removeItem('fortress_lock_until');
                localStorage.removeItem('fortress_violations_strict');
                violationCount = 0;
                $scope.violations = 0;
                $scope.accountSuspended = false;
            }
            
            // ---------- FULLSCREEN & TAB SWITCH PROTECTION (MOBILE FRIENDLY) ----------
            let isFullscreenActive = false;
            
            function requestFullscreenMode() {
                const elem = document.documentElement;
                const requestMethod = elem.requestFullscreen || elem.webkitRequestFullscreen || elem.msRequestFullscreen;
                if (requestMethod) {
                    requestMethod.call(elem).catch(err => {
                        console.log("Fullscreen error", err);
                        if(!$scope.accountSuspended) $scope.logViolation("⛔ FULLSCREEN PERMISSION DENIED");
                    });
                    isFullscreenActive = true;
                    document.body.classList.add('fullscreen-active');
                }
            }
            
            $scope.exitFullscreen = function() {
                const exitMethod = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
                if (exitMethod) exitMethod.call(document);
                isFullscreenActive = false;
                document.body.classList.remove('fullscreen-active');
            };
            
            // Monitor fullscreen change
            $document.on('fullscreenchange webkitfullscreenchange', function() {
                const fsElement = document.fullscreenElement || document.webkitFullscreenElement;
                if (!fsElement && isFullscreenActive && !$scope.accountSuspended && !$scope.blurActive) {
                    $scope.$apply(() => {
                        $scope.logViolation("🚨 EXITED FULLSCREEN (tab switch / home)");
                    });
                    setTimeout(() => { if(!$scope.accountSuspended && !$scope.blurActive) requestFullscreenMode(); }, 300);
                    isFullscreenActive = false;
                } else if (fsElement) {
                    isFullscreenActive = true;
                }
            });
            
            // Visibility API: tab/app switch detection (critical for mobile)
            $document.on('visibilitychange', function() {
                if ($scope.accountSuspended || $scope.blurActive) return;
                if (document.hidden) {
                    $scope.$apply(() => {
                        $scope.logViolation("📱 APP/TAB SWITCH DETECTED (violation)");
                    });
                } else {
                    // Re-engage fullscreen when back
                    if (!document.fullscreenElement && !$scope.accountSuspended && !$scope.blurActive) {
                        setTimeout(() => requestFullscreenMode(), 200);
                    }
                }
            });
            
            // Mobile specific: touch events to block pinch-zoom on iframe
            $window.addEventListener('touchmove', function(e) {
                if (e.touches.length > 1 && !$scope.accountSuspended) {
                    e.preventDefault();
                    $scope.$apply(() => $scope.logViolation("🔍 PINCH-ZOOM BLOCKED"));
                }
            }, { passive: false });
            
            // ---------- STOP BUTTON: Blur overlay ----------
            $scope.activateStopBlur = function() {
                if ($scope.accountSuspended) return;
                if ($scope.blurActive) return;
                $scope.blurActive = true;
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    $scope.exitFullscreen();
                }
                $scope.showToast("🔒 Screen Locked - Press RESUME to continue");
            };
            
            $scope.resumeSession = function() {
                if ($scope.accountSuspended) return;
                $scope.blurActive = false;
                requestFullscreenMode();
                $scope.showToast("✅ Session resumed - Protection active");
                $scope.$applyAsync();
            };
            
            // Auto request fullscreen on load (mobile)
            setTimeout(() => { if(!$scope.accountSuspended && !$scope.blurActive) requestFullscreenMode(); }, 400);
            
            // ---------- VIOLATION LOGGER ----------
            $scope.logViolation = function(msg) {
                if ($scope.accountSuspended) return;
                violationCount++;
                $scope.violations = violationCount;
                localStorage.setItem('fortress_violations_strict', violationCount);
                if (navigator.vibrate) navigator.vibrate(100);
                $scope.showToast(`⚠️ ${msg} (${violationCount}/10)`);
                
                if (violationCount >= 10) {
                    const blockUntilMs = Date.now() + (24 * 60 * 60 * 1000);
                    localStorage.setItem('fortress_lock_until', blockUntilMs);
                    $scope.accountSuspended = true;
                    $scope.blurActive = false;
                    document.body.style.pointerEvents = 'none';
                    $scope.$applyAsync();
                }
                $scope.$applyAsync();
            };
            
            $scope.showToast = (message) => {
                const existing = document.querySelector('.security-toast');
                if(existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = 'security-toast';
                toast.innerHTML = `<i class="fas fa-ban me-2"></i> ${message}`;
                document.body.appendChild(toast);
                $timeout(() => { if(toast && toast.remove) toast.remove(); }, 2800);
            };
            
            // ---------- GLOBAL BLOCKS (Copy/Paste/Context/DevTools) ----------
            function blockClipboard(e) {
                e.preventDefault();
                e.stopPropagation();
                let act = "CLIPBOARD";
                if(e.type === 'copy') act = "📋 COPY";
                else if(e.type === 'paste') act = "📌 PASTE";
                else if(e.type === 'cut') act = "✂️ CUT";
                $scope.$apply(() => $scope.logViolation(`${act} BLOCKED`));
                return false;
            }
            $window.addEventListener('copy', blockClipboard, true);
            $window.addEventListener('paste', blockClipboard, true);
            $window.addEventListener('cut', blockClipboard, true);
            $window.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                $scope.$apply(() => $scope.logViolation("🖱️ RIGHT-CLICK BLOCKED"));
                return false;
            }, true);
            
            $window.addEventListener('keydown', (e) => {
                const key = e.key;
                const ctrl = e.ctrlKey || e.metaKey;
                const shift = e.shiftKey;
                if (key === 'F12' || (ctrl && shift && (key === 'I' || key === 'J' || key === 'C')) ||
                    (ctrl && key === 'U') || (ctrl && key === 's') || (ctrl && key === 'p') ||
                    key === 'PrintScreen' || key === 'F5' || (ctrl && key === 'r')) {
                    e.preventDefault();
                    $scope.$apply(() => $scope.logViolation("🛡️ DEVTOOLS/PRINT BLOCKED"));
                    return false;
                }
            }, true);
            
            $window.addEventListener('dragstart', (e) => { e.preventDefault(); $scope.$apply(() => $scope.logViolation("📁 DRAG BLOCKED")); });
            $window.addEventListener('drop', (e) => { e.preventDefault(); $scope.$apply(() => $scope.logViolation("🚫 DROP BLOCKED")); });
            $document.on('selectstart', (e) => { if (e.target.tagName !== 'TEXTAREA') e.preventDefault(); });
            
            // ---------- IFRAME ANTI-COPY INJECTION ----------
            const iframeElem = document.getElementById('pdfFrame');
            if (iframeElem) {
                iframeElem.addEventListener('load', () => {
                    try {
                        const iframeDoc = iframeElem.contentDocument || iframeElem.contentWindow.document;
                        if (iframeDoc) {
                            const styleTag = iframeDoc.createElement('style');
                            styleTag.textContent = '* { user-select: none !important; -webkit-user-select: none !important; }';
                            iframeDoc.head.appendChild(styleTag);
                            iframeDoc.addEventListener('contextmenu', (e) => { e.preventDefault(); $scope.$apply(() => $scope.logViolation("📄 PDF RIGHT-CLICK")); });
                            iframeDoc.addEventListener('copy', (e) => { e.preventDefault(); $scope.$apply(() => $scope.logViolation("📄 PDF COPY ATTEMPT")); });
                            iframeDoc.addEventListener('keydown', (e) => { if(e.ctrlKey && (e.key === 'c' || e.key === 'C')) { e.preventDefault(); $scope.$apply(() => $scope.logViolation("PDF CTRL+C")); } });
                        }
                    } catch(er) { /* cross-origin */ }
                });
            }
            
            // ---------- LOAD DOCUMENT & NOTES ----------
            let currentNote = null;
            try {
                currentNote = JSON.parse(localStorage.getItem('currentNote') || '{"content":""}');
            } catch(e) { currentNote = { content: "" }; }
            let rawUrl = currentNote.content || '';
            let finalUrl = rawUrl;
            if (rawUrl.includes('/view') || rawUrl.includes('drive.google.com')) {
                finalUrl = rawUrl.split('/view')[0] + '/preview';
            } else if (!rawUrl) finalUrl = 'about:blank';
            if (finalUrl.includes('?') === false) finalUrl += '?embedded=true&rm=minimal';
            else finalUrl += '&embedded=true';
            $scope.trustedUrl = $sce.trustAsResourceUrl(finalUrl);
            
            let savedPencil = localStorage.getItem('fortress_pencil_notes');
            $scope.pencilNote = savedPencil && savedPencil.length ? savedPencil : "🔐 FORTRESS MOBILE VAULT\n\n✅ Copy/Paste blocked\n✅ Tab switch = violation\n✅ Press LOCK to blur screen\n\nYour notes are safe.";
            $scope.$watch('pencilNote', (nv) => { if (nv !== undefined) localStorage.setItem('fortress_pencil_notes', nv); });
            
            // PDF Export
            $scope.downloadNotesPDF = function() {
                if ($scope.accountSuspended) { $scope.showToast("SUSPENDED"); return; }
                const noteElem = document.querySelector('.pencil-text');
                if (noteElem && noteElem.value) {
                    const clone = document.createElement('div');
                    clone.style.cssText = 'background:#0f0c0a;color:#f5e7d3;padding:20px;font-family:monospace;white-space:pre-wrap;';
                    clone.innerText = noteElem.value;
                    document.body.appendChild(clone);
                    html2pdf().set({ margin: 0.7, filename: `Secure_Notes_${Date.now()}.pdf`, image: { type: 'jpeg', quality: 0.98 } }).from(clone).save().then(() => {
                        document.body.removeChild(clone);
                        $scope.showToast("✅ Notes PDF saved");
                    }).catch(() => { document.body.removeChild(clone); $scope.showToast("Export failed"); });
                } else { $scope.showToast("No notes"); }
            };
            
            // Timer 30 minutes
            $scope.timeLeft = "30:00";
            let totalSec = 1800;
            const timerInt = setInterval(() => {
                if ($scope.accountSuspended) { clearInterval(timerInt); return; }
                if (totalSec <= 0) {
                    clearInterval(timerInt);
                    $scope.$apply(() => $scope.timeLeft = "00:00");
                    localStorage.removeItem('fortress_violations_strict');
                    $scope.showToast("Session expired - redirect");
                    setTimeout(() => window.location.href = "dashboard.html", 1500);
                } else {
                    totalSec--;
                    let m = Math.floor(totalSec/60);
                    let s = totalSec%60;
                    $scope.$apply(() => $scope.timeLeft = `${m}:${s<10?'0'+s:s}`);
                }
            }, 1000);
            
            $scope.$on('$destroy', () => clearInterval(timerInt));
        });
    </script>
</body>
</html>

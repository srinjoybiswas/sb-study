<!DOCTYPE html>
<html lang="en" ng-app="sbNotesApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Viewer | SB Notes</title>

    <!-- Frameworks -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Logic Files -->
    <script src="js/app.js"></script>

    <style>
        body { background-color: #121212; color: #e0e0e0; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; }

        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 5vw;
            color: rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            z-index: 10005;
            pointer-events: none;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
        }

        .note-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 15px;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .viewer-container {
            flex-grow: 1;
            width: 100%;
            height: 750px;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .button-blocker {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px; 
            height: 60px;
            z-index: 10010; 
            background: transparent;
            cursor: default;
        }

        .protection-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            pointer-events: none;
        }

        #content-vault { transition: filter 0.3s ease; }

        @media print { body { display: none !important; } }
        [ng-cloak] { display: none !important; }
    </style>
</head>

<body ng-controller="ViewerController" oncontextmenu="return false;" ng-cloak>

    <!-- Watermark -->
    <div class="watermark">{{userEmail}} - SB NOTES</div>

    <div class="container-fluid py-4 px-md-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="dashboard.html" class="btn btn-outline-light rounded-pill px-4 shadow-sm">
                <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
            </a>

            <!-- ✅ UPDATED RIGHT SIDE -->
            <div class="text-end">

                <div class="mb-2">
                    <span class="badge bg-warning text-dark p-2 px-3 shadow-sm">
                        ⏱️ {{timeLeft}}
                    </span>
                </div>

                <div class="mb-2">
                    <button class="btn btn-sm btn-outline-light me-1" ng-click="zoomIn()">
                        <i class="fas fa-search-plus"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-light" ng-click="zoomOut()">
                        <i class="fas fa-search-minus"></i>
                    </button>
                </div>

                <span class="badge bg-danger p-2 px-3 shadow-sm border border-danger">
                    <i class="fas fa-shield-alt me-1"></i> SECURE VIEWING MODE
                </span>
            </div>
        </div>

        <div class="note-card shadow-lg" id="content-vault">

            <div class="p-4 border-bottom border-secondary bg-dark text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge bg-primary mb-2">{{note.dept}}</span>
                        <h2 class="fw-bold mb-0 text-white">{{note.title}}</h2>
                    </div>
                    <div class="text-end d-none d-md-block">
                        <small class="text-muted d-block small">Authorized for:</small>
                        <small class="text-info fw-bold">{{userEmail}}</small>
                    </div>
                </div>
            </div>

            <div ng-show="loading" class="text-center py-5 my-5">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
                <p class="mt-3 text-muted fw-bold">Verifying Credentials & Loading Content...</p>
            </div>

            <div ng-hide="loading" class="viewer-container">
                <div class="button-blocker"></div>
                <div class="protection-overlay"></div>

                <iframe 
                    ng-src="{{trustedUrl}}" 
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    allow="autoplay"
                    style="position: relative; z-index: 1;">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        app.controller('ViewerController', function ($scope, $sce, $window) {

            $scope.userEmail = localStorage.getItem('userEmail') || "UNAUTHORIZED_ACCESS";
            $scope.loading = true;

            if (localStorage.getItem('isLoggedIn') !== 'true') {
                $window.location.href = 'login.html';
            }

            const savedNote = localStorage.getItem('currentNote');
            if (!savedNote) {
                $window.location.href = 'dashboard.html';
                return;
            }

            $scope.note = JSON.parse(savedNote);

            let rawUrl = $scope.note.content; 
            let cleanUrl = rawUrl.split('/view')[0] + '/preview';
            $scope.trustedUrl = $sce.trustAsResourceUrl(cleanUrl);

            setTimeout(() => {
                $scope.loading = false;
                $scope.$apply();
            }, 1200);

            // Blur protection
            $window.onblur = () => document.getElementById('content-vault').style.filter = "blur(25px)";
            $window.onfocus = () => document.getElementById('content-vault').style.filter = "blur(0px)";

            // Keyboard protection
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u' || (e.shiftKey && e.key === 'I'))) {
                    e.preventDefault();
                    alert("Security Violation: This resource cannot be saved or printed.");
                }
                if (e.key === "PrintScreen") {
                    navigator.clipboard.writeText("Content Protected by SB Notes");
                    alert("Screenshots are strictly prohibited.");
                }
            });

            // =====================
            // 🔍 ZOOM
            // =====================
            $scope.zoomLevel = 1;

            $scope.zoomIn = function () {
                $scope.zoomLevel += 0.1;
                document.querySelector("iframe").style.transform = "scale(" + $scope.zoomLevel + ")";
                document.querySelector("iframe").style.transformOrigin = "0 0";
            };

            $scope.zoomOut = function () {
                if ($scope.zoomLevel > 0.5) {
                    $scope.zoomLevel -= 0.1;
                    document.querySelector("iframe").style.transform = "scale(" + $scope.zoomLevel + ")";
                    document.querySelector("iframe").style.transformOrigin = "0 0";
                }
            };

            // =====================
            // ⏱️ TIMER (30 MIN)
            // =====================
            let totalTime = 30 * 60;

            function updateTimer() {
                let m = Math.floor(totalTime / 60);
                let s = totalTime % 60;

                $scope.$applyAsync(() => {
                    $scope.timeLeft = m + ":" + (s < 10 ? "0" : "") + s;
                });

                if (totalTime <= 0) {
                    alert("Session expired.");
                    window.location.href = "dashboard.html";
                }

                totalTime--;
            }

            setInterval(updateTimer, 1000);
        });
    </script>

</body>
</html>

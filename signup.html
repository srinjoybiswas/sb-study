<!DOCTYPE html>
<html lang="en" ng-app="sbNotesApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SB Notes</title>

    <!-- 1. Load AngularJS ONLY ONCE -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    
    <!-- 2. Load Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- 3. Load Your Logic Files in Order -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>

    <style>
        body { background-color: #f1f4f9; min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
        .signup-card { max-width: 450px; width: 100%; border-radius: 20px; border: none; }
        .form-control { padding: 10px 15px; border-radius: 8px; }
        .step-indicator { font-size: 12px; font-weight: bold; color: #007bff; text-transform: uppercase; }
    </style>
</head>

<!-- Use AuthController defined in auth.js -->
<body ng-controller="AuthController">

<div class="container d-flex justify-content-center">
    <div class="card signup-card shadow-lg p-4">
        <div class="text-center mb-4">
            <span class="step-indicator">Step 1 of 2: Registration</span>
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted">Join SB Notes for premium access</p>
        </div>

        <!-- Displays error from the server -->
        <div class="alert alert-danger p-2 small" ng-show="errorMessage">
            <i class="fas fa-exclamation-circle me-1"></i> {{errorMessage}}
        </div>

        <form ng-submit="handleSignup()" name="signupForm">
            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label small fw-bold">Full Name</label>
                <input type="text" class="form-control" ng-model="user.name" placeholder="John Doe" required>
            </div>

            <!-- College Email -->
            <div class="mb-3">
                <label class="form-label small fw-bold">College Email ID</label>
                <input type="email" class="form-control" ng-model="user.email" 
                       placeholder="yourname@college.edu" 
                       ng-pattern="/^[a-z0-9._%+-]+@[a-z0-9.-]+\.(edu|in|com|org|net)$/i" required>
                <div class="form-text small" style="font-size: 10px;">Please use your institutional email if possible.</div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label small fw-bold">Create Password</label>
                <input type="password" class="form-control" ng-model="user.password" minlength="6" required>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label small fw-bold">Confirm Password</label>
                <input type="password" class="form-control" ng-model="user.confirmPassword" required>
                <div class="text-danger small" ng-show="user.password != user.confirmPassword && user.confirmPassword">
                    Passwords do not match.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm" 
                    ng-disabled="loading || user.password != user.confirmPassword">
                <span ng-hide="loading">Continue to Payment <i class="fas fa-arrow-right ms-2"></i></span>
                <span ng-show="loading" class="spinner-border spinner-border-sm"></span>
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="small">Already have an account? <a href="login.html" class="text-decoration-none fw-bold">Log In</a></p>
        </div>
    </div>
</div>

</body>
</html>

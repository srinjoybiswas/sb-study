<!DOCTYPE html>
<html lang="en" ng-app="sbNotesApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SB Notes</title>

    <!-- 1. Load AngularJS Library FIRST (Required to fix {{errorMessage}} display) -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    
    <!-- 2. Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- 3. Your Custom Logic (Order: app.js must load before auth.js) -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>

    <style>
        [ng-cloak] { display: none !important; }
        body { background-color: #f1f4f9; min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
        .signup-card { max-width: 450px; width: 100%; border-radius: 20px; border: none; }
        .form-control { padding: 10px 15px; border-radius: 8px; }
        .step-indicator { font-size: 12px; font-weight: bold; color: #007bff; text-transform: uppercase; }
        .spinner-border { width: 1.2rem; height: 1.2rem; }
    </style>
</head>

<!-- ng-cloak prevents raw curly braces from showing while the page loads -->
<body ng-controller="AuthController" ng-cloak>

<div class="container d-flex justify-content-center">
    <div class="card signup-card shadow-lg p-4">
        <div class="text-center mb-4">
            <span class="step-indicator">Step 1 of 2: Registration</span>
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted">Join SB Notes for premium access</p>
        </div>

        <!-- Displays error from the server only if errorMessage exists -->
        <div class="alert alert-danger p-2 small" ng-show="errorMessage">
            <i class="fas fa-exclamation-circle me-1"></i> {{errorMessage}}
        </div>

        <form ng-submit="handleSignup()" name="signupForm" novalidate>
            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label small fw-bold">Full Name</label>
                <input type="text" class="form-control" ng-model="user.name" placeholder="Enter your full name" required>
            </div>

            <!-- College Email -->
            <div class="mb-3">
                <label class="form-label small fw-bold">College Email ID</label>
                <input type="email" class="form-control" ng-model="user.email" 
                       placeholder="yourname@college.edu" required>
                <div class="form-text" style="font-size: 10px;">Institutional emails preferred for verification.</div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label small fw-bold">Create Password</label>
                <input type="password" class="form-control" ng-model="user.password" minlength="6" required>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label small fw-bold">Confirm Password</label>
                <input type="password" class="form-control" ng-model="user.confirmPassword" required>
                <div class="text-danger small mt-1" ng-show="user.password != user.confirmPassword && user.confirmPassword">
                    <i class="fas fa-times-circle"></i> Passwords do not match.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm" 
                    ng-disabled="loading || signupForm.$invalid || user.password != user.confirmPassword">
                <span ng-hide="loading">Continue to Payment <i class="fas fa-arrow-right ms-2"></i></span>
                <span ng-show="loading">
                    <span class="spinner-border spinner-border-sm me-2"></span>Processing...
                </span>
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted">Already have an account? <a href="login.html" class="text-decoration-none fw-bold text-primary">Log In</a></p>
        </div>
    </div>
</div>

</body>
</html>

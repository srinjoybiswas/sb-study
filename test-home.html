<!DOCTYPE html>
<html>
<head>
  <title>Test System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Login Box Style */
    #loginBox {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    #loginBox h2 {
      color: #333;
      margin-bottom: 25px;
      font-size: 28px;
    }

    #loginBox input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: 0.3s;
    }

    #loginBox input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }

    #loginBox button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: transform 0.2s;
    }

    #loginBox button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }

    #loginError {
      color: #e74c3c;
      margin-top: 10px;
      font-size: 14px;
    }

    /* Test Box Style */
    #testBox {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
    }

    #timer {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      font-family: monospace;
    }

    #question {
      font-size: 22px;
      color: #333;
      margin-bottom: 25px;
      line-height: 1.4;
      font-weight: 500;
    }

    #options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 30px;
    }

    #options div {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
    }

    #options div:hover {
      background: #e9ecef;
      border-color: #667eea;
      transform: translateX(5px);
    }

    #options div.selected {
      background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
      border-color: #667eea;
      border-width: 2px;
    }

    #testBox button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 35px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin: 0 auto;
      transition: all 0.3s;
    }

    #testBox button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }

    /* Fail Box Style */
    #failBox {
      background: white;
      border-radius: 20px;
      padding: 50px;
      width: 100%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: shake 0.5s ease;
    }

    #failBox h1 {
      color: #e74c3c;
      font-size: 32px;
      margin-bottom: 20px;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      #loginBox, #testBox, #failBox {
        padding: 25px;
      }
      
      #timer {
        font-size: 36px;
      }
      
      #question {
        font-size: 18px;
      }
      
      #options div {
        padding: 10px 14px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>📝 Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p id="loginError"></p>
</div>

<!-- TEST -->
<div id="testBox" style="display:none;">
  <h2 id="timer">60:00</h2>
  <h3 id="question"></h3>
  <div id="options"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<!-- FAIL -->
<div id="failBox" style="display:none;">
  <h1>❌ Test Stopped</h1>
</div>

<script src="student.js"></script>
<script src="test.js"></script>
<script src="main.js"></script>

</body>
</html>
